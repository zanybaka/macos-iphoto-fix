name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  shellcheck:
    name: shellcheck + syntax
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: ShellCheck (fixer script)
        # gate at warning so advisory info/style findings can't break the build
        # across shellcheck versions; the script is also clean at default severity.
        run: shellcheck --severity=warning fix-iphoto-sequoia.sh

      - name: Bash syntax check
        run: bash -n fix-iphoto-sequoia.sh
