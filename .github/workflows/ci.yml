name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  shellcheck:
    name: shellcheck + syntax
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: ShellCheck (fixer script)
        run: shellcheck fix-iphoto-sequoia.sh

      - name: Bash syntax check
        run: bash -n fix-iphoto-sequoia.sh
